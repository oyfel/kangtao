<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Portal</title>
    
    <!-- Canonical Kang Tao Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23060606'/%3E%3Cpolygon points='15,20 92,20 85,80 8,80' fill='%23ff5500'/%3E%3Ctext x='47%25' y='55%25' font-family='Noto Sans SC, sans-serif' font-weight='900' font-size='42' fill='%23060606' text-anchor='middle' dominant-baseline='central'%3E康陶%3C/text%3E%3C/svg%3E">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Plus+Jakarta+Sans:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #060606;
            --orange-primary: #ff5500;
            --orange-glow: rgba(255, 85, 0, 0.3);
            --text-main: #ffffff;
            --text-muted: #888890;
            --border-color: #222226;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Ambient subtle background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 85, 0, 0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 0, 0.008) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: center;
            z-index: 0;
            pointer-events: none;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        .support-container {
            background: #111113;
            border: 1px solid var(--border-color);
            padding: 3.5rem 2.5rem;
            border-radius: 16px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            width: 100%;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1.5rem;
            color: #ffffff;
        }

        .support-text {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .email-link {
            display: inline-block;
            color: var(--orange-primary);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1px dashed var(--orange-primary);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .email-link:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
            text-shadow: 0 0 10px var(--orange-glow);
        }

        /* --- BACK TO MAIN SITE NAVIGATION LINK --- */
        .back-navigation {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .back-link {
            color: #ffffff;
            text-decoration: underline;
            text-underline-offset: 4px;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--orange-primary);
        }

        /* Footer Element */
        .footer-row {
            width: 100%;
            text-align: center;
            padding-top: 2rem;
            z-index: 1;
        }

        .tagline { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            font-size: 0.8rem; 
            font-weight: 700; 
            color: rgba(255, 255, 255, 0.15); 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        /* Responsive scaling adjustments */
        @media (max-width: 480px) {
            .support-container { padding: 2.5rem 1.5rem; }
            h1 { font-size: 1.5rem; }
            .support-text { font-size: 0.95rem; }
            .back-navigation { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <main>
        <div class="support-container">
            <h1>Support Portal</h1>
            
            <p class="support-text">
                For assistance, please email us at 
                <a href="mailto:help@kangtao.co" class="email-link">help@kangtao.co</a>
            </p>

            <!-- Back to Main Site Dynamic Link Anchor -->
            <div class="back-navigation">
                <a href="https://kangtao.co" class="back-link">Click here</a> to go back
            </div>
        </div>
    </main>

    <div class="footer-row">
        <div class="tagline">THIS IS KANGTAO. THIS IS INTELLIGENCE.</div>
    </div>

</body>
</html>
