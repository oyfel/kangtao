<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KANGTAO | System Offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800;900&family=Plus+Jakarta+Sans:wght@700&family=Noto+Sans+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #060606;
            --surface-color: #0f0f11;
            --orange-primary: #ff5500;
            --text-main: #ffffff;
            --border-color: #222226;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 2rem 1rem;
        }

        /* Ambient background grid */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255, 85, 0, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 85, 0, 0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center;
            z-index: 0;
        }

        /* Responsive Container */
        .container {
            background: linear-gradient(180deg, #111113 0%, rgba(17, 17, 19, 0.95) 85%, rgba(6, 6, 6, 0) 100%);
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid transparent;
            padding: 5rem 2rem 4rem 2rem;
            border-radius: 24px 24px 0 0;
            text-align: center;
            width: 100%;
            max-width: 720px; /* Wider footprint for desktop alignment */
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Branding Block with balanced spacing */
        .brand-header-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-bottom: 4rem;
        }

        /* Integrated Row matching authentic logo scaling proportions */
        .brand-horizontal-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            line-height: 0.95;
            margin-bottom: 1.5rem;
            flex-wrap: nowrap;
        }

        /* Large Chinese Characters */
        .zh-text {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 4.5rem; /* Upgraded baseline desktop size */
            font-weight: 900;
            letter-spacing: -3px;
        }

        /* Scaled Down English Component */
        .en-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.2rem; /* Proportionally smaller than Chinese to match branding */
            font-weight: 900;
            letter-spacing: -2px;
            margin-left: 10px;
            padding-bottom: 4px;
        }

        /* Split accents */
        .accent-white { 
            color: #ffffff; 
        }

        .accent-orange { 
            color: var(--orange-primary); 
            text-shadow: 0 0 30px rgba(255, 85, 0, 0.45); 
        }

        /* Subtitle layout perfectly fitting the centralized block width */
        .slogan-container {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 550px;
            gap: 16px;
        }

        .orange-line {
            flex-grow: 1;
            height: 1px;
            background-color: var(--orange-primary);
            box-shadow: 0 0 8px rgba(255, 85, 0, 0.4);
        }

        .slogan-sub {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--orange-primary);
            letter-spacing: 6px;
            text-indent: 6px;
            white-space: nowrap;
        }

        /* Balanced status block spacing to remove vast negative gaps */
        .status-block {
            margin-bottom: 6rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }

        .badge-offline {
            display: inline-block;
            border: 1px solid #2d2d32;
            background: rgba(255, 255, 255, 0.01);
            padding: 0.5rem 2rem;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #787880;
        }

        .timeline-text {
            color: var(--orange-primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Clean fading bottom boundary */
        .tagline {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 2rem;
            width: 100%;
        }

        /* --- RESPONSIVE MEDIA QUERIES FOR MOBILE --- */
        @media (max-width: 600px) {
            .container {
                padding: 4rem 1.5rem 3rem 1.5rem;
                margin-top: auto;
                margin-bottom: 0;
                border-radius: 20px 20px 0 0;
            }

            .brand-header-block {
                margin-bottom: 3rem;
            }

            /* Scales typography cleanly so it never breaks layout rows on mobile */
            .zh-text {
                font-size: 2.8rem;
                letter-spacing: -1.5px;
            }

            .en-text {
                font-size: 2rem;
                letter-spacing: -1px;
                margin-left: 5px;
                padding-bottom: 2px;
            }

            .slogan-sub {
                font-size: 0.75rem;
                letter-spacing: 4px;
                text-indent: 4px;
            }

            .slogan-container {
                gap: 10px;
            }

            .status-block {
                margin-bottom: 4rem;
            }

            .badge-offline {
                padding: 0.4rem 1.5rem;
                font-size: 0.75rem;
            }

            .timeline-text {
                font-size: 0.85rem;
            }

            .tagline {
                font-size: 0.7rem;
                letter-spacing: 2.5px;
                padding-top: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Scaled Brand Header Block -->
        <div class="brand-header-block">
            <div class="brand-horizontal-row">
                <span class="zh-text accent-white">康</span>
                <span class="zh-text accent-orange">陶</span>
                <span class="en-text accent-white">KANG</span>
                <span class="en-text accent-orange">TAO</span>
            </div>
            
            <div class="slogan-container">
                <div class="orange-line"></div>
                <div class="slogan-sub">智能电子解决方案</div>
                <div class="orange-line"></div>
            </div>
        </div>

        <!-- Compressed Status Section -->
        <div class="status-block">
            <div class="badge-offline">System Offline</div>
            <div class="timeline-text">FULL WEBSITE DEPLOYMENT // Q3 2026</div>
        </div>

        <!-- Grounded Bottom Tagline -->
        <div class="tagline">this is kangtao. This is intelligence.</div>
    </div>

</body>
</html>
