<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work In Progress</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --surface-color: #1a1a1a;
            --orange-primary: #ff6600;
            --orange-hover: #e05500;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background glow effect */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--orange-primary);
            filter: blur(150px);
            opacity: 0.15;
            top: 20%;
            left: 20%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--orange-primary);
            filter: blur(150px);
            opacity: 0.1;
            bottom: 20%;
            right: 20%;
            z-index: 0;
        }

        .container {
            background: var(--surface-color);
            border: 1px solid #2a2a2a;
            padding: 3rem 2rem;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--orange-primary);
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 102, 0, 0.1);
            border: 1px solid rgba(255, 102, 0, 0.3);
            color: var(--orange-primary);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(255, 102, 0, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 0 10px rgba(255, 102, 0, 0); }
            100% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(255, 102, 0, 0); }
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            font-weight: 400;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Countdown Timer Styling */
        .countdown {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            gap: 10px;
        }

        .countdown-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #2d2d2d;
            padding: 1rem;
            border-radius: 10px;
            flex: 1;
            min-width: 70px;
        }

        .countdown-number {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--orange-primary);
        }

        .countdown-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            display: block;
        }

        /* Interactive Form Styling */
        .subscribe-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 4px;
            transition: border-color 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--orange-primary);
        }

        input[type="email"] {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0.8rem;
            flex-grow: 1;
            font-size: 0.95rem;
        }

        input[type="email"]::placeholder {
            color: #555;
        }

        button {
            background: var(--orange-primary);
            color: white;
            border: none;
            outline: none;
            padding: 0 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--orange-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .message {
            margin-top: 10px;
            font-size: 0.85rem;
            min-height: 20px;
            transition: color 0.3s;
        }

        .success { color: #00ff66; }
        .error { color: #ff3333; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">ORANGE<span>BLACK</span></div>
        <div class="status-badge">Under Construction</div>

        <h2>We're cooking up something big.</h2>
        <p>Our team is currently working hard to bring you a brand new web experience. Turn on notifications below to get notified the second we launch.</p>

        <!-- Countdown Timer -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-number" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="hours">00</span>
                <span class="countdown-label">Hours</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="minutes">00</span>
                <span class="countdown-label">Mins</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-number" id="seconds">00</span>
                <span class="countdown-label">Secs</span>
            </div>
        </div>

        <!-- Notification Form -->
        <form class="subscribe-form" id="notifyForm" onsubmit="handleSubscribe(event)">
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Enter your email address" required>
                <button type="submit">Notify Me</button>
            </div>
            <div class="message" id="formMessage"></div>
        </form>
    </div>

    <script>
        // --- COUNTDOWN TIMER ---
        // Set your target launch date here (Year, Month [0-11], Day, Hour, Minute)
        // This sets it to 30 days from now for demonstration
        const launchDate = new Date();
        launchDate.setDate(launchDate.getDate() + 30); 

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                document.querySelector(".countdown").innerHTML = "<h3>We are live!</h3>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = String(days).padStart(2, '0');
            document.getElementById("hours").innerText = String(hours).padStart(2, '0');
            document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
            document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
        }

        // Run immediately and then loop every second
        updateCountdown();
        setInterval(updateCountdown, 1000);


        // --- FORM INTERACTION ---
        function handleSubscribe(event) {
            event.preventDefault();
            const email = document.getElementById("emailInput").value;
            const messageElement = document.getElementById("formMessage");
            const button = event.target.querySelector("button");

            // Simple front-end validation check
            if (email) {
                button.disabled = true;
                button.innerText = "Saving...";
                
                // Simulating an API save request
                setTimeout(() => {
                    messageElement.textContent = "Awesome! We've added you to the launch list. 🚀";
                    messageElement.className = "message success";
                    document.getElementById("emailInput").value = "";
                    button.disabled = false;
                    button.innerText = "Notify Me";
                }, 1200);
            } else {
                messageElement.textContent = "Please enter a valid email address.";
                messageElement.className = "message error";
            }
        }
    </script>
</body>
</html>
